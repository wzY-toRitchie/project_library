# 生产环境配置文件
# 使用方法: java -jar bookstore.jar --spring.profiles.active=prod

# Server Configuration
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/online_bookstore?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
spring.datasource.username=bookstore_user
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 连接池配置
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# JPA Configuration - 生产环境使用validate防止意外修改表结构
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=86400000

# Logging - 生产环境减少日志输出
logging.level.root=WARN
logging.level.com.bookstore=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# CORS Configuration - 修改为实际域名
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://yourdomain.com}

# 文件上传路径
app.upload.dir=/var/www/bookstore/uploads
