# Active Profile (启用 dev profile 以加载示例数据)
spring.profiles.active=dev

# Server Configuration
server.port=8080

# Database Configuration (provide credentials through environment variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/online_bookstore?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Security Configuration (JWT_SECRET should come from the environment)
# Base64 encoded key, at least 32 bytes (256 bits) for HS256
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# Login Security
app.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
app.login.lock-duration-minutes=${LOGIN_LOCK_DURATION:15}

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# 文件上传路径
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# OAuth2 Configuration
app.oauth2.enabled=${OAUTH2_ENABLED:false}
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth/callback}
app.oauth2.github.client-id=${GITHUB_CLIENT_ID:}
app.oauth2.github.client-secret=${GITHUB_CLIENT_SECRET:}

# OpenRouter AI
app.ai.openrouter.api-key=${OPENROUTER_API_KEY:}
app.ai.openrouter.base-url=https://openrouter.ai/api/v1
app.ai.openrouter.model=openrouter/free
app.ai.openrouter.mock=true

# Alipay Configuration (沙箱环境)
app.alipay.app-id=${ALIPAY_APP_ID:}
app.alipay.private-key=${ALIPAY_PRIVATE_KEY:}
app.alipay.alipay-public-key=${ALIPAY_PUBLIC_KEY:}
app.alipay.gateway=${ALIPAY_GATEWAY:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
app.alipay.return-url=${ALIPAY_RETURN_URL:http://localhost:5173/payment/return}
app.alipay.notify-url=${ALIPAY_NOTIFY_URL:http://localhost:8080/api/payment/notify}
app.alipay.sign-type=${ALIPAY_SIGN_TYPE:RSA2}
app.alipay.sandbox=${ALIPAY_SANDBOX:true}

# 邮件验证码配置
app.email.mock=${EMAIL_MOCK:true}
app.email.code-expiration-minutes=${EMAIL_CODE_EXPIRATION_MINUTES:5}
app.email.send-interval-seconds=${EMAIL_SEND_INTERVAL_SECONDS:60}

# QQ 邮箱 SMTP（Mock=false 时生效）
spring.mail.host=${MAIL_HOST:smtp.qq.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
